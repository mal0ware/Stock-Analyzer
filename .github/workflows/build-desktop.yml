name: Build Desktop Apps

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            tauri_args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            tauri_args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: api/requirements.txt

      # Linux system deps for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Build Python sidecar (self-contained binary)
      - name: Build Python sidecar
        run: |
          pip install pyinstaller
          pip install -r api/requirements.txt
          pyinstaller --onefile --name market-analyst-api api/main.py --add-data "api:api" --add-data "ml:ml"

      - name: Copy sidecar to Tauri binaries
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            cp dist/market-analyst-api.exe "frontend/src-tauri/binaries/market-analyst-api-${{ matrix.target }}.exe"
          else
            cp dist/market-analyst-api "frontend/src-tauri/binaries/market-analyst-api-${{ matrix.target }}"
          fi

      # Build frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Build Tauri app
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tauriScript: npx tauri
          args: ${{ matrix.tauri_args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'AI Market Analyst ${{ github.ref_name }}'
          releaseBody: |
            ## AI Market Analyst ${{ github.ref_name }}

            Download the installer for your platform below.

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` |
            | Windows | `.msi` / `.exe` |
            | Linux | `.deb` / `.AppImage` |

            ### Quick Install (no download needed)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/mal0ware/Stock-Analyzer/main/install.sh | bash
            ```
          releaseDraft: false
          prerelease: false
