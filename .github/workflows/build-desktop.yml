name: Build Desktop Apps

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            tauri_args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            tauri_args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Linux system deps for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Build React frontend first (needed by both PyInstaller sidecar and Tauri)
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Build Python sidecar with frontend bundled inside
      - name: Install Python dependencies
        run: pip install pyinstaller && pip install -r api/requirements.txt

      - name: Build Python sidecar (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          pyinstaller --name market-analyst-api \
            api/main.py \
            --add-data "api:api" \
            --add-data "ml:ml" \
            --add-data "frontend/dist:frontend-dist"

      - name: Build Python sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          pyinstaller --name market-analyst-api api/main.py --add-data "api;api" --add-data "ml;ml" --add-data "frontend/dist;frontend-dist"

      - name: Copy sidecar to Tauri resources
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/resources
          cp -r dist/market-analyst-api frontend/src-tauri/resources/sidecar
          # Ensure the binary is executable (Unix)
          if [[ "${{ matrix.platform }}" != "windows-latest" ]]; then
            chmod +x frontend/src-tauri/resources/sidecar/market-analyst-api
          fi

      # Build Tauri desktop app (.exe / .dmg / .deb / .AppImage)
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tauriScript: npx tauri
          args: ${{ matrix.tauri_args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'AI Market Analyst ${{ github.ref_name }}'
          releaseBody: |
            ## AI Market Analyst ${{ github.ref_name }}

            Download the installer for your platform:

            | Platform | File | How to install |
            |----------|------|----------------|
            | **Windows** | `.msi` | Double-click, follow the wizard |
            | **macOS** (Apple Silicon) | `.dmg` | Open, drag to Applications |
            | **Linux** | `.deb` or `.AppImage` | Double-click or `sudo dpkg -i` |

            The app runs like any desktop application — no terminal, no browser, no setup required.
          releaseDraft: false
          prerelease: false
