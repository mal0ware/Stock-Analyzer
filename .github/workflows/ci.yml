name: CI

on:
  push:
    branches: [main, 'v2/**']
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Python backend
      - name: Install Python dependencies
        run: pip install -r api/requirements.txt

      - name: Lint Python (ruff)
        run: pip install ruff && ruff check api/ ml/ tests/
        continue-on-error: true

      - name: Type check Python (mypy)
        run: pip install mypy && mypy api/main.py --ignore-missing-imports
        continue-on-error: true

      - name: Run pytest
        run: pytest tests/ -v

      # Frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend (eslint)
        working-directory: frontend
        run: npx eslint src/
        continue-on-error: true

      - name: Type check frontend (tsc)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ai-market-analyst:test .
      - name: Smoke test Docker container
        run: |
          docker run -d --name test -p 8080:8080 ai-market-analyst:test
          sleep 5
          curl -f http://localhost:8080/api/health
          docker stop test
