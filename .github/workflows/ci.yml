name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: api/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Python backend
      - name: Install Python dependencies
        run: pip install -r api/requirements.txt

      - name: Lint Python (ruff)
        run: pip install ruff && ruff check api/ ml/ tests/
        continue-on-error: true

      - name: Run pytest
        run: pytest tests/ -v

      # Frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-market-analyst:test .

      - name: Smoke test
        run: |
          docker run -d --name test -p 8080:8080 ai-market-analyst:test
          sleep 8
          curl -f http://localhost:8080/api/health
          curl -f http://localhost:8080/ | grep -q "root"
          docker stop test
