name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Before filing, please check the existing [issues](https://github.com/mal0ware/Stock-Analyzer/issues) to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user pain point or workflow gap. "Make it better" is not specific enough.
      placeholder: "When I'm backtesting in the simulator, I can't see..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should this work from the user's perspective? Sketches and rough wireframes welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why this one wins.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Simulator
        - Charts
        - Order Book
        - ML / signals
        - Watchlist
        - Sector overview
        - Symbol detail
        - Theming / UX
        - API / backend
        - Build / packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots from other tools, links to research, etc.
