services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - CORS_ORIGINS=*
      - RATE_LIMIT=60
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
