services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - CORS_ORIGINS=*
      - RATE_LIMIT=120
      - DATABASE_URL=sqlite:///./market_analyst.db
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db-data:
