[tool.mypy]
# Target the active runtime. python-build-standalone ships 3.13 but the
# project supports 3.10+ for dev installs.
python_version = "3.10"
files = ["api", "ml"]
# ``api/`` modules import each other flat (``from cache import cache``) rather
# than via the package path — these are executed with ``--app-dir api``. Put
# the directory on mypy's search path so the imports resolve the same way.
mypy_path = "api"
explicit_package_bases = true
namespace_packages = true

# Gradual strict — catch the highest-signal issues without drowning in
# third-party stubs that don't ship type info (yfinance, VADER, numba).
strict_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
warn_unreachable = true
check_untyped_defs = true
no_implicit_optional = true
disallow_untyped_defs = false     # Gradual: our own code is mostly typed, but
                                  # some legacy paths still use inferred types.
disallow_incomplete_defs = true

# Every call-site into an untyped third-party lib would otherwise error.
# We flip this per-module below, only for libs that truly lack stubs.
ignore_missing_imports = false

[[tool.mypy.overrides]]
module = [
    "yfinance.*",
    "numba.*",
    "vaderSentiment.*",
    "sklearn.*",
    "pandas.*",
    "structlog.*",
    "transformers.*",
    "nltk.*",
    "praw.*",
    "aiohttp.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# Throwaway / exploratory scripts are exempt from the gradual strict rules.
module = [
    "ml.train_cli",
    "benchmarks.*",
    "scripts.*",
]
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false

[[tool.mypy.overrides]]
# FastAPI route functions rely on framework introspection of Pydantic models
# for the response schema; annotating ``-> dict`` on every endpoint would
# lie about the actual response type, so we simply don't require return
# annotations on them. Middleware signatures include ``call_next`` which
# Starlette types internally as a private protocol.
module = [
    "main",
    "middleware",
    "routes.*",
]
disallow_untyped_defs = false
disallow_incomplete_defs = false
warn_return_any = false
