<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep navy to dark indigo -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <!-- Accent gradient: electric blue to cyan -->
    <linearGradient id="line" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Glow for the chart line -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle inner shadow -->
    <filter id="inset">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Green accent for the uptrend arrow -->
    <linearGradient id="arrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96"
        fill="none" stroke="#334155" stroke-width="2" opacity="0.5"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.08" stroke="#94a3b8" stroke-width="1">
    <line x1="100" y1="140" x2="100" y2="380"/>
    <line x1="190" y1="140" x2="190" y2="380"/>
    <line x1="280" y1="140" x2="280" y2="380"/>
    <line x1="370" y1="140" x2="370" y2="380"/>
    <line x1="80" y1="200" x2="430" y2="200"/>
    <line x1="80" y1="260" x2="430" y2="260"/>
    <line x1="80" y1="320" x2="430" y2="320"/>
  </g>

  <!-- Chart area fill (subtle gradient under the line) -->
  <path d="M100,340 L160,310 L220,320 L260,280 L300,250 L340,210 L380,180 L420,150 L420,380 L100,380 Z"
        fill="url(#line)" opacity="0.08"/>

  <!-- Main chart line (the hero element) -->
  <polyline
    points="100,340 160,310 220,320 260,280 300,250 340,210 380,180 420,150"
    fill="none"
    stroke="url(#line)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Data points on the line -->
  <g fill="#fff">
    <circle cx="100" cy="340" r="4" opacity="0.5"/>
    <circle cx="160" cy="310" r="4" opacity="0.5"/>
    <circle cx="220" cy="320" r="4" opacity="0.5"/>
    <circle cx="260" cy="280" r="5" opacity="0.6"/>
    <circle cx="300" cy="250" r="5" opacity="0.6"/>
    <circle cx="340" cy="210" r="5" opacity="0.7"/>
    <circle cx="380" cy="180" r="5" opacity="0.8"/>
    <circle cx="420" cy="150" r="7" opacity="1.0"/>
  </g>

  <!-- Uptrend arrow at the end of the line -->
  <g transform="translate(420,150)" filter="url(#glow)">
    <path d="M-2,-8 L12,-28 L26,-8 L18,-8 L18,8 L6,8 L6,-8 Z"
          fill="url(#arrow)" opacity="0.9"/>
  </g>

  <!-- "SA" text mark at bottom -->
  <text x="256" y="440" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="48" font-weight="700" letter-spacing="6"
        fill="#94a3b8" opacity="0.4">SA</text>
</svg>
