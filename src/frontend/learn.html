<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn - Stock Analyzer</title>
    <link rel="stylesheet" href="css/styles.css?v=3">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <span class="nav-icon">&#x1F4CA;</span>
            <span class="nav-title">Stock Analyzer</span>
        </a>

        <div class="nav-search-mini">
            <input type="text" class="search-input-mini" id="navSearchInput" placeholder="Search ticker or company..." autocomplete="off">
            <div class="search-results" id="navSearchResults"></div>
        </div>

        <div class="nav-right">
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="learn.html" class="nav-link active">Learn</a>
            </nav>
            <div class="theme-picker">
                <button class="theme-btn" id="themeToggle" title="Change theme">&#x1F3A8;</button>
                <div class="theme-dropdown" id="themeDropdown">
                    <button class="theme-option active" data-theme="dark">
                        <span class="theme-swatch" style="background:#0f1117"></span> Dark
                    </button>
                    <button class="theme-option" data-theme="light">
                        <span class="theme-swatch" style="background:#f5f6fa"></span> Light
                    </button>
                    <button class="theme-option" data-theme="midnight">
                        <span class="theme-swatch" style="background:#000000"></span> Midnight
                    </button>
                    <button class="theme-option" data-theme="ocean">
                        <span class="theme-swatch" style="background:#0b1628"></span> Ocean
                    </button>
                    <button class="theme-option" data-theme="terminal">
                        <span class="theme-swatch" style="background:#0a0e0a"></span> Terminal
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="learn-container">
        <div class="learn-hero">
            <h1>Stock Market Glossary</h1>
            <p class="subtitle">Everything you need to know about stock statistics, explained in plain English.</p>
            <div class="learn-search-wrapper">
                <input type="text" id="glossarySearch" class="glossary-search"
                       placeholder="Search terms..." autocomplete="off">
            </div>
        </div>

        <div class="category-filters" id="categoryFilters">
            <button class="cat-btn active" data-category="all">All</button>
        </div>

        <div id="glossaryContent" class="glossary-grid">
            <div class="loading-placeholder">
                <span class="inline-spinner"></span> Loading glossary...
            </div>
        </div>
    </main>

    <footer class="footer">
        For educational and informational purposes only. Not financial advice.
    </footer>

    <script src="js/theme.js?v=3"></script>
    <script src="js/search.js?v=3"></script>
    <script src="js/learn.js?v=3"></script>
</body>
</html>
